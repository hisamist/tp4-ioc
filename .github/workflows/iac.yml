name: Infrastructure as Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== JOB 1 : Validation =====
  validate:
    name: Valider Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # ===== JOB 2 : Plan (sur PR) =====
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Sauvegarder le plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: tfplan

  # ===== JOB 3 : Apply + Configure (sur main) =====
  deploy:
    name: Terraform Apply + Ansible
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Installer Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Lancer le playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/playbook.yml